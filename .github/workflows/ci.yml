name: node_CI

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - '**'

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Nodejs
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'

    - name: Install Dependencies
      run: npm ci

    - name: Build
      run: npm run build
